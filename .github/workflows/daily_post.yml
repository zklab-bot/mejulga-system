name: Daily Posts - Dra. Julga

on:
  schedule:
    - cron: '0 12 * * *'   # 09h BRT - manha
    - cron: '0 15 * * *'   # 12h BRT - almoco (pico)
    - cron: '0 21 * * *'   # 18h BRT - saida do trabalho
    - cron: '0 23 * * *'   # 20h BRT - apos jantar (prime time)
    - cron: '0 1  * * *'   # 22h BRT - scroll pre-sono
  workflow_dispatch:
    inputs:
      categoria:
        description: 'Categoria do post'
        required: false
        default: ''
      formato:
        description: 'Formato do post (carrossel ou glossario)'
        required: false
        default: ''

concurrency:
  group: daily-post
  cancel-in-progress: false

env:
  META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
  IG_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pillow anthropic python-dotenv requests

      - name: Definir categoria
        id: categoria
        run: |
          HORA=$(date -u +"%H" | sed 's/^0//')
          DIA=$(date -u +"%u")
          IDX=$(( (DIA - 1) % 7 ))

          MANUAL="${{ github.event.inputs.categoria }}"
          MANUAL_FMT="${{ github.event.inputs.formato }}"
          if [ -n "$MANUAL" ]; then
            echo "categoria=$MANUAL" >> $GITHUB_OUTPUT
            FMT="${MANUAL_FMT:-carrossel}"
            echo "formato=$FMT" >> $GITHUB_OUTPUT
            echo "Categoria (manual): $MANUAL | Formato: $FMT"
            exit 0
          fi

          declare -a SLOT_A=("dinheiro"  "amor"      "trabalho"   "dopamina"   "vida_adulta" "social"     "saude_mental")
          declare -a SLOT_B=("amor"      "trabalho"  "dopamina"   "vida_adulta" "social"     "saude_mental" "dinheiro")
          declare -a SLOT_C=("trabalho"  "dopamina"  "vida_adulta" "social"    "saude_mental" "dinheiro"   "amor")
          declare -a SLOT_D=("dopamina"  "vida_adulta" "social"   "saude_mental" "dinheiro"  "amor"       "trabalho")
          declare -a SLOT_E=("vida_adulta" "social"  "saude_mental" "dinheiro" "amor"       "trabalho"   "dopamina")

          if   [ "$HORA" = "12" ]; then CATEGORIA="${SLOT_A[$IDX]}"
          elif [ "$HORA" = "15" ]; then CATEGORIA="${SLOT_B[$IDX]}"
          elif [ "$HORA" = "21" ]; then CATEGORIA="${SLOT_C[$IDX]}"
          elif [ "$HORA" = "23" ]; then CATEGORIA="${SLOT_D[$IDX]}"
          else                          CATEGORIA="${SLOT_E[$IDX]}"
          fi

          # Glossário: quarta-feira (DIA=3) no slot 23h UTC
          if [ "$DIA" = "3" ] && [ "$HORA" = "23" ]; then
            FORMATO="glossario"
          else
            FORMATO="carrossel"
          fi

          echo "categoria=$CATEGORIA" >> $GITHUB_OUTPUT
          echo "formato=$FORMATO" >> $GITHUB_OUTPUT
          echo "Categoria (slot ${HORA}h UTC): $CATEGORIA | Formato: $FORMATO"

      - name: Verificar duplicata
        id: dedup
        run: |
          HOJE=$(date -u +"%Y-%m-%d")
          FORMATO="${{ steps.categoria.outputs.formato }}"
          if [ "$FORMATO" = "glossario" ]; then
            CHAVE="${HOJE}_${{ steps.categoria.outputs.categoria }}_glossario"
          else
            CHAVE="${HOJE}_${{ steps.categoria.outputs.categoria }}"
          fi
          echo "chave=$CHAVE" >> $GITHUB_OUTPUT
          STATE="content-engine/generated/engagement_state.json"

          if [ ! -f "$STATE" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          JA_PUBLICADO=$(CHAVE="$CHAVE" python3 -c "import json,os; s=json.load(open('content-engine/generated/engagement_state.json')); print('true' if os.environ['CHAVE'] in s.get('posts_published',[]) else 'false')")
          echo "skip=$JA_PUBLICADO" >> $GITHUB_OUTPUT
          if [ "$JA_PUBLICADO" = "true" ]; then
            echo "Post '$CHAVE' ja publicado hoje - pulando."
          fi

      - name: Notificar post pulado
        if: steps.dedup.outputs.skip == 'true'
        run: |
          cd content-engine
          python -m notify send_post_skipped --categoria ${{ steps.categoria.outputs.categoria }}

      - name: Gerar roteiro
        if: steps.dedup.outputs.skip != 'true'
        run: cd content-engine && python generate_reels.py --categoria ${{ steps.categoria.outputs.categoria }} --formato ${{ steps.categoria.outputs.formato }} --sem_audio

      - name: Gerar slides do carrossel
        if: steps.dedup.outputs.skip != 'true'
        run: cd content-engine && python gerar_carrossel.py --categoria ${{ steps.categoria.outputs.categoria }} --formato ${{ steps.categoria.outputs.formato }}

      - name: Publicar carrossel no Instagram
        if: steps.dedup.outputs.skip != 'true'
        id: publicar
        run: |
          cd content-engine
          HORA=$(date -u +"%Hh%M")
          MEDIA_ID=$(python post_carrossel_instagram.py \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --formato ${{ steps.categoria.outputs.formato }} \
            --output-id)
          echo "media_id=$MEDIA_ID" >> $GITHUB_OUTPUT
          echo "hora=$HORA" >> $GITHUB_OUTPUT

      - name: Notificar falha na publicacao
        if: steps.dedup.outputs.skip != 'true' && failure() && steps.publicar.outcome == 'failure'
        run: |
          cd content-engine
          python3 -c "import sys; sys.path.insert(0,'.'); from engagement.shared import state; state.log_error('post_carrossel','Falha no step de publicacao')"
          HORA=$(date -u +"%Hh%M")
          python -m notify send_post_failed \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --hora "${HORA}" \
            --erro "Falha ao publicar carrossel - verifique GitHub Actions"

      - name: Registrar post publicado
        if: steps.dedup.outputs.skip != 'true' && steps.publicar.outputs.media_id != ''
        run: |
          CHAVE="${{ steps.dedup.outputs.chave }}"
          CHAVE="$CHAVE" python3 -c "import json,os; f='content-engine/generated/engagement_state.json'; d=json.load(open(f)) if os.path.exists(f) else {}; p=d.setdefault('posts_published',[]); c=os.environ['CHAVE']; c not in p and p.append(c); os.makedirs(os.path.dirname(f),exist_ok=True); json.dump(d,open(f,'w'),ensure_ascii=False,indent=2); print('Registrado:',c)"

      - name: Notificar post publicado
        if: steps.dedup.outputs.skip != 'true' && steps.publicar.outputs.media_id != ''
        run: |
          cd content-engine
          HOJE=$(date -u +"%Y-%m-%d")
          CAT="${{ steps.categoria.outputs.categoria }}"
          FORMATO="${{ steps.categoria.outputs.formato }}"
          if [ "$FORMATO" = "glossario" ]; then
            TITULO=$(CAT="$CAT" python3 -c "import json,glob,os; from datetime import datetime; h=datetime.utcnow().strftime('%Y-%m-%d'); c=os.environ['CAT']; f=glob.glob('generated/reels/'+h+'_'+c+'_glossario.json'); print(json.load(open(f[0])).get('termo',c) if f else c)")
          else
            TITULO=$(CAT="$CAT" python3 -c "import json,glob,os; from datetime import datetime; h=datetime.utcnow().strftime('%Y-%m-%d'); c=os.environ['CAT']; f=glob.glob('generated/reels/'+h+'_'+c+'_reels.json'); print(json.load(open(f[0])).get('titulo',c) if f else c)")
          fi
          python -m notify send_post_published \
            --categoria "$CAT" \
            --titulo "$TITULO" \
            --hora "${{ steps.publicar.outputs.hora }}" \
            --media_id ${{ steps.publicar.outputs.media_id }}

      - name: Enviar votacao no Telegram
        if: steps.dedup.outputs.skip != 'true' && steps.publicar.outputs.media_id != '' && steps.categoria.outputs.formato == 'carrossel'
        continue-on-error: true
        run: |
          cd content-engine
          HOJE=$(date -u +"%Y-%m-%d")
          CAT="${{ steps.categoria.outputs.categoria }}"
          CHAVE="${{ steps.dedup.outputs.chave }}"
          TIPO=$(CAT="$CAT" python3 -c "import json,glob,os; from datetime import datetime; h=datetime.utcnow().strftime('%Y-%m-%d'); c=os.environ['CAT']; f=glob.glob('generated/reels/'+h+'_'+c+'_reels.json'); print(json.load(open(f[0])).get('tipo_veredicto','A') if f else 'A')")
          TITULO=$(CAT="$CAT" python3 -c "import json,glob,os; from datetime import datetime; h=datetime.utcnow().strftime('%Y-%m-%d'); c=os.environ['CAT']; f=glob.glob('generated/reels/'+h+'_'+c+'_reels.json'); print(json.load(open(f[0])).get('titulo',c) if f else c)")
          CRIME=$(CAT="$CAT" python3 -c "import json,glob,os; from datetime import datetime; h=datetime.utcnow().strftime('%Y-%m-%d'); c=os.environ['CAT']; f=glob.glob('generated/reels/'+h+'_'+c+'_reels.json'); print(json.load(open(f[0])).get('crime','') if f else '')")
          python -m engagement.feedback send_rating_request \
            --chave "$CHAVE" \
            --media_id ${{ steps.publicar.outputs.media_id }} \
            --tipo_veredicto "$TIPO" \
            --titulo "$TITULO" \
            --crime "$CRIME" \
            --categoria "$CAT"

      - name: Postar comentario de engajamento
        if: steps.dedup.outputs.skip != 'true' && steps.publicar.outputs.media_id != ''
        run: |
          cd content-engine
          python -m engagement.post_engagement \
            --media_id ${{ steps.publicar.outputs.media_id }} \
            --categoria ${{ steps.categoria.outputs.categoria }}

      - name: Notificar comentario de votacao
        if: steps.dedup.outputs.skip != 'true' && steps.publicar.outputs.media_id != ''
        run: |
          cd content-engine
          python -m notify send_voting_comment --media_id ${{ steps.publicar.outputs.media_id }}

      - name: Commit do estado e slides gerados
        if: steps.dedup.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: post ${{ steps.categoria.outputs.categoria }} publicado [skip ci]"
          file_pattern: |
            content-engine/generated/engagement_state.json
            content-engine/generated/reels/
