name: Daily Posts — Dra. Julga

on:
  schedule:
    - cron: '0 11 * * *'   # 08h Brasília
    - cron: '0 15 * * *'   # 12h Brasília
    - cron: '0 21 * * *'   # 18h Brasília
  workflow_dispatch:
    inputs:
      categoria:
        description: 'Categoria do post'
        required: false
        default: 'dinheiro'

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pillow anthropic python-dotenv requests numpy moviepy

      - name: Definir categoria do post
        id: categoria
        run: |
          HORA=$(date -u +"%H")
          DIA=$(date -u +"%u")

          if [ -n "${{ github.event.inputs.categoria }}" ]; then
            CATEGORIA="${{ github.event.inputs.categoria }}"
          elif [ "$HORA" = "11" ]; then
            CATS=("dinheiro" "amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          elif [ "$HORA" = "15" ]; then
            CATS=("amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          else
            CATS=("trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro" "amor")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          fi

          echo "categoria=$CATEGORIA" >> $GITHUB_OUTPUT
          echo "📅 Categoria: $CATEGORIA"

      - name: Gerar roteiro
        run: |
          cd content-engine
          python generate_reels.py \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --sem_audio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Gerar imagem PNG
        run: |
          cd content-engine
          python generate_video_v2.py \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --estilo minimalista

      - name: Publicar no Instagram
        run: |
          cd content-engine
          python post_image_to_instagram.py \
            --categoria ${{ steps.categoria.outputs.categoria }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: zklab-bot/mejulga-assets

      - name: Log de sucesso
        run: |
          echo "🎉 Post publicado!"
          echo "📅 Data: $(date -u)"
          echo "🏷️  Categoria: ${{ steps.categoria.outputs.categoria }}"
