name: Daily Posts — Dra. Julga

on:
  schedule:
    # 3 posts por dia (horário de Brasília = UTC-3)
    - cron: '0 11 * * *'   # 08h Brasília
    - cron: '0 15 * * *'   # 12h Brasília
    - cron: '0 21 * * *'   # 18h Brasília
  workflow_dispatch:
    inputs:
      categoria:
        description: 'Categoria do post'
        required: false
        default: ''

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pillow anthropic python-dotenv requests

      - name: Definir categoria do post
        id: categoria
        run: |
          # Rotação automática de categorias por hora UTC
          HORA=$(date -u +"%H")
          DIA=$(date -u +"%u")  # 1=seg ... 7=dom

          if [ -n "${{ github.event.inputs.categoria }}" ]; then
            # Dispatch manual com categoria específica
            CATEGORIA="${{ github.event.inputs.categoria }}"
          elif [ "$HORA" = "11" ]; then
            # 08h Brasília — categorias do dia rotacionam
            CATS=("dinheiro" "amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          elif [ "$HORA" = "15" ]; then
            # 12h Brasília — segunda categoria do dia
            CATS=("amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          else
            # 18h Brasília — terceira categoria do dia
            CATS=("trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro" "amor")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          fi

          echo "categoria=$CATEGORIA" >> $GITHUB_OUTPUT
          echo "📅 Categoria selecionada: $CATEGORIA"

      - name: Gerar roteiro
        run: |
          cd content-engine
          python generate_script.py --categoria ${{ steps.categoria.outputs.categoria }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Gerar imagem
        run: |
          cd content-engine
          python generate_video_v2.py \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --estilo minimalista
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Converter MP4 para PNG (frame único)
        run: |
          cd content-engine
          HOJE=$(date -u +"%Y-%m-%d")
          CAT=${{ steps.categoria.outputs.categoria }}
          MP4="generated/reels/${HOJE}_${CAT}_minimalista_reels.mp4"
          PNG="generated/reels/${HOJE}_${CAT}_minimalista_reels.png"
          # Extrai primeiro frame do vídeo como PNG
          ffmpeg -i "$MP4" -vframes 1 "$PNG" -y
          echo "✅ PNG extraído: $PNG"

      - name: Publicar no Instagram
        run: |
          cd content-engine
          python post_image_to_instagram.py \
            --categoria ${{ steps.categoria.outputs.categoria }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: zklab-bot/mejulga-assets

      - name: Log de sucesso
        run: |
          echo "🎉 Post publicado com sucesso!"
          echo "📅 Data: $(date -u)"
          echo "🏷️  Categoria: ${{ steps.categoria.outputs.categoria }}"
