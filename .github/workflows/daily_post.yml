name: Daily Posts — Dra. Julga

on:
  schedule:
    - cron: '0 15 * * *'   # 12h Brasília (UTC-3)
    - cron: '0 21 * * *'   # 18h Brasília (UTC-3)
    - cron: '0 0 * * *'    # 21h Brasília (UTC-3, meia-noite UTC)
  workflow_dispatch:
    inputs:
      categoria:
        description: 'Categoria do post'
        required: false
        default: 'dinheiro'

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pillow anthropic python-dotenv requests numpy

      - name: Definir categoria do post
        id: categoria
        run: |
          HORA=$(date -u +"%H")
          DIA=$(date -u +"%u")
          if [ -n "${{ github.event.inputs.categoria }}" ]; then
            CATEGORIA="${{ github.event.inputs.categoria }}"
          elif [ "$HORA" = "15" ]; then
            # 12h BRT — provocação/engajamento
            CATS=("dinheiro" "amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          elif [ "$HORA" = "21" ]; then
            # 18h BRT — caso clínico
            CATS=("amor" "trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          else
            # 21h BRT (00h UTC) — CTA direto
            CATS=("trabalho" "dopamina" "vida_adulta" "social" "saude_mental" "dinheiro" "amor")
            CATEGORIA="${CATS[$((($DIA - 1) % 7))]}"
          fi
          echo "categoria=$CATEGORIA" >> $GITHUB_OUTPUT
          echo "Categoria: $CATEGORIA"

      - name: Gerar roteiro
        run: |
          cd content-engine
          python generate_reels.py \
            --categoria ${{ steps.categoria.outputs.categoria }} \
            --sem_audio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Gerar slides do carrossel
        run: |
          cd content-engine
          python gerar_carrossel.py \
            --categoria ${{ steps.categoria.outputs.categoria }}

      - name: Publicar carrossel no Instagram
        run: |
          cd content-engine
          python post_carrossel_instagram.py \
            --categoria ${{ steps.categoria.outputs.categoria }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}

      - name: Log de sucesso
        run: |
          echo "🎉 Carrossel publicado!"
          echo "📅 Data: $(date -u)"
          echo "🏷️  Categoria: ${{ steps.categoria.outputs.categoria }}"
